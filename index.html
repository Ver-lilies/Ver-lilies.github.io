<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web摄像头图像扭曲 (纯前端)</title>
    <style>
        body { text-align: center; font-family: sans-serif; background-color: #222; color: white; margin: 0; padding: 20px;}
        canvas { border: 2px solid #555; background-color: #000; margin-top: 10px; max-width: 100%; height: auto; }
        .controls { margin-top: 20px; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        button { padding: 10px 20px; cursor: pointer; font-size: 16px; border-radius: 5px; border: none; background-color: #4CAF50; color: white;}
        button:hover { background-color: #45a049; }
        #status { margin-bottom: 20px; font-weight: bold; color: #ffeb3b; }
    </style>
</head>
<body>
    <h2>纯前端版图像扭曲 (适用于 GitHub Pages)</h2>
    <div id="status">正在加载 OpenCV.js...
        <div id="progress-container" style="width: 100%; max-width: 400px; background-color: #ddd; margin: 10px auto; border-radius: 5px; overflow: hidden; display: none;">
            <div id="progress-bar" style="height: 20px; width: 0%; background-color: #4CAF50; transition: width 0.2s;"></div>
        </div>
    </div>
    
    <video id="video" width="640" height="480" autoplay playsinline style="display: none;"></video>
    <canvas id="canvas" width="640" height="480"></canvas>
    
    <div class="controls">
        <button onclick="setMode(0)">0: 正常</button>
        <button onclick="setMode(1)">1: 波浪 (Wave)</button>
        <button onclick="setMode(2)">2: 凸透镜 (Bulge)</button>
        <button onclick="setMode(3)">3: 凹透镜 (Pinch)</button>
        <button onclick="stopCamera()" style="background-color: #f44336;">关闭摄像头</button>
    </div>
    
    <!-- 新增：调整扭曲程度与拍照保存的控制面板 -->
    <div class="controls" style="margin-top: 10px;">
        <label for="intensityRange" style="line-height: 40px; margin-right: 10px;">扭曲程度:</label>
        <input type="range" id="intensityRange" min="0" max="5" step="0.1" value="1.0" onchange="updateIntensity(this.value)" oninput="updateIntensity(this.value)" style="vertical-align: middle;">
        <span id="intensityValue" style="line-height: 40px; margin-left: 10px; width: 30px; text-align: left;">1.0</span>
        <button onclick="takePhoto()" style="background-color: #2196F3; margin-left: 20px;">📷 拍照并保存</button>
    </div>

    <script>
        // Module object to listen for OpenCV.js being ready and print its loading phase
        var Module = {
            setStatus: function(text) {
                const statusEl = document.getElementById('status');
                if (text) {
                    statusEl.innerText = text;
                }
            },
            onRuntimeInitialized: function() {
                onOpenCvReady();
            }
        };
    </script>

    <!-- 使用 Fetch 手动加载并监控进度，从而代替直接引入 script -->
    <script>
        (async function loadOpenCV() {
            const statusEl = document.getElementById('status');
            const progressContainer = document.getElementById('progress-container');
            const progressBar = document.getElementById('progress-bar');
            
            // 使用另一个 CDN 能够提供 CORS 和进度
            const url = 'https://cdn.jsdelivr.net/npm/opencv.js@1.2.1/opencv.min.js';
            progressContainer.style.display = 'block';

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("网络错误");
                
                const contentLength = response.headers.get('content-length');
                if (!contentLength) {
                    statusEl.innerText = "正在下载 OpenCV.js...";
                }
                
                const total = parseInt(contentLength, 10);
                let loaded = 0;
                
                const reader = response.body.getReader();
                const chunks = [];
                
                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    
                    chunks.push(value);
                    loaded += value.length;
                    
                    if (total) {
                        const percent = (loaded / total) * 100;
                        progressBar.style.width = percent + '%';
                        statusEl.innerText = `正在下载 OpenCV.js... ${Math.round(percent)}%`;
                    } else {
                        statusEl.innerText = `正在下载 OpenCV.js... ${(loaded/1024/1024).toFixed(2)} MB`;
                    }
                }
                
                statusEl.innerText = "下载完成，正在解析...";
                progressContainer.style.display = 'none';
                
                // 将代码合成字符串并执行
                const blob = new Blob(chunks, { type: 'application/javascript' });
                const blobUrl = URL.createObjectURL(blob);
                
                const script = document.createElement('script');
                script.src = blobUrl;
                script.onload = () => { URL.revokeObjectURL(blobUrl); };
                document.body.appendChild(script);
                
            } catch (err) {
                console.error("加载 OpenCV.js 失败:", err);
                statusEl.innerText = "加载 OpenCV.js 失败，请刷新重试。";
                statusEl.style.color = "red";
            }
        })();
    </script>
    
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const statusEl = document.getElementById('status');
        
        let isOpenCvReady = false;
        let mode = 0;
        let intensity = 1.0;
        const modeNames = ["0: Normal", "1: Wave Distortion", "2: Bulge Distortion", "3: Pinch Distortion"];

        // 预先计算好的映射表
        let map_x_wave, map_y_wave;
        let map_x_bulge, map_y_bulge;
        let map_x_pinch, map_y_pinch;
        
        // OpenCV 矩阵变量，避免内存泄漏
        let srcMat, dstMat;

        function setMode(newMode) {
            mode = newMode;
        }
        
        function updateIntensity(value) {
            intensity = parseFloat(value);
            document.getElementById('intensityValue').innerText = intensity.toFixed(1);
            if (isOpenCvReady && video.videoWidth > 0 && video.videoHeight > 0) {
                // 重新计算映射表
                initDistortionMaps(video.videoWidth, video.videoHeight);
            }
        }
        
        function takePhoto() {
            if (!isOpenCvReady || !video.srcObject) {
                alert("摄像头尚未运行，无法拍照！");
                return;
            }
            // 获取当前 Canvas 上的图像数据，转为 Data URL
            const dataUrl = canvas.toDataURL("image/jpeg", 0.9);
            // 创建一个隐藏的 a 标签来触发下载
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = `photo_${new Date().getTime()}.jpg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // 简单的拍照反馈动画效果
            canvas.style.opacity = 0.5;
            setTimeout(() => { canvas.style.opacity = 1; }, 200);
        }

        // OpenCV.js 加载完成后的回调
        function onOpenCvReady() {
            isOpenCvReady = true;
            statusEl.innerText = "OpenCV.js 已加载，请求摄像头权限...";
            startCamera();
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                .then(function(stream) {
                    video.srcObject = stream;
                    video.play();
                    
                    video.onloadedmetadata = () => {
                        const width = video.videoWidth;
                        const height = video.videoHeight;
                        canvas.width = width;
                        canvas.height = height;
                        
                        // 初始化 OpenCV 矩阵和映射表
                        initDistortionMaps(width, height);
                        srcMat = new cv.Mat(height, width, cv.CV_8UC4);
                        dstMat = new cv.Mat(height, width, cv.CV_8UC4);
                        
                        statusEl.innerText = "摄像头正在运行";
                        requestAnimationFrame(processVideo);
                    };
                })
                .catch(function(err) {
                    console.log("摄像头获取失败:", err);
                    statusEl.innerText = "错误：无法访问摄像头，请检查权限。";
                    statusEl.style.color = "red";
                });
        }

        function stopCamera() {
            if (video.srcObject) {
                // 停止所有摄像头轨道
                video.srcObject.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                statusEl.innerText = "摄像头已关闭";
                statusEl.style.color = "white";

                // 清空视频显示区域
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = "#000";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#FFF";
                ctx.fillText("摄像头已关闭，请刷新页面重新开启", 20, 40);
            }
        }

        // 对应 Python 版的 init_distortion_maps
        function initDistortionMaps(width, height) {
            // 如果之前有分配内存，在重新生成时先释放（如果不释放会导致内存泄漏）
            if (map_x_wave && !map_x_wave.isDeleted()) {
                map_x_wave.delete(); map_y_wave.delete();
                map_x_bulge.delete(); map_y_bulge.delete();
                map_x_pinch.delete(); map_y_pinch.delete();
            }
            
            map_x_wave = new cv.Mat(height, width, cv.CV_32FC1);
            map_y_wave = new cv.Mat(height, width, cv.CV_32FC1);
            map_x_bulge = new cv.Mat(height, width, cv.CV_32FC1);
            map_y_bulge = new cv.Mat(height, width, cv.CV_32FC1);
            map_x_pinch = new cv.Mat(height, width, cv.CV_32FC1);
            map_y_pinch = new cv.Mat(height, width, cv.CV_32FC1);

            const cx = width / 2.0;
            const cy = height / 2.0;
            const R_max = Math.sqrt(cx*cx + cy*cy) + 1;

            // 为了性能，在 JS 中直接用嵌套循环计算
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    // 1. Wave: 使用 intensity 控制波动幅度
                    map_x_wave.floatPtr(y, x)[0] = x + (20 * intensity) * Math.sin(y / 20.0);
                    map_y_wave.floatPtr(y, x)[0] = y;

                    // 极坐标用于透镜
                    const dx = x - cx;
                    const dy = y - cy;
                    const r = Math.sqrt(dx*dx + dy*dy);
                    let theta = Math.atan2(dy, dx);

                    // 2. Bulge: 膨胀幅度受 intensity 控制
                    const r_bulge_base = r * (r / R_max);
                    const r_bulge = r + (r_bulge_base - r) * intensity;
                    map_x_bulge.floatPtr(y, x)[0] = cx + r_bulge * Math.cos(theta);
                    map_y_bulge.floatPtr(y, x)[0] = cy + r_bulge * Math.sin(theta);

                    // 3. Pinch: 缩小幅度受 intensity 控制
                    const r_pinch_base = Math.sqrt(r * R_max);
                    const r_pinch = r + (r_pinch_base - r) * intensity;
                    map_x_pinch.floatPtr(y, x)[0] = cx + r_pinch * Math.cos(theta);
                    map_y_pinch.floatPtr(y, x)[0] = cy + r_pinch * Math.sin(theta);
                }
            }
        }

        function processVideo() {
            if (!isOpenCvReady || video.readyState !== video.HAVE_ENOUGH_DATA) {
                requestAnimationFrame(processVideo);
                return;
            }

            try {
                // 将视频帧绘制到一个临时的大小的 canvas / 处理上下文中
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // 将 Canvas 图像读取到 OpenCV Mat 中
                let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                srcMat.data.set(imageData.data);

                if (mode === 0) {
                    cv.imshow('canvas', srcMat);
                } else {
                    let map_x, map_y;
                    if (mode === 1) { map_x = map_x_wave; map_y = map_y_wave; }
                    else if (mode === 2) { map_x = map_x_bulge; map_y = map_y_bulge; }
                    else if (mode === 3) { map_x = map_x_pinch; map_y = map_y_pinch; }

                    // 执行映射 (remap)
                    cv.remap(srcMat, dstMat, map_x, map_y, cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar(0, 0, 0, 255));
                    cv.imshow('canvas', dstMat);
                }

                // 在画面上绘制提示文本
                ctx.fillStyle = "#00FF00";
                ctx.font = "24px Arial";
                ctx.fillText(`${modeNames[mode]} (Intensity: ${intensity.toFixed(1)})`, 20, 40);

            } catch (err) {
                console.error(err);
            }

            requestAnimationFrame(processVideo);
        }
    </script>
</body>
</html>
