<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Web 摄像头图像扭曲工作台</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0d1013;
            --surface: #171b20;
            --surface-2: #20262d;
            --surface-3: #28313a;
            --line: #303a44;
            --line-soft: rgba(255, 255, 255, 0.08);
            --text: #f7f4ef;
            --muted: #a8b2ba;
            --accent: #22c7a9;
            --accent-strong: #12a48a;
            --accent-soft: rgba(34, 199, 169, 0.14);
            --warning: #f6c84c;
            --danger: #ef5b5b;
            --photo: #5b8cff;
            --ink: #080b0d;
            --shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(34, 199, 169, 0.16), transparent 34rem),
                linear-gradient(135deg, rgba(91, 140, 255, 0.10), transparent 30%),
                linear-gradient(315deg, rgba(239, 91, 91, 0.08), transparent 34%),
                var(--bg);
        }

        .app {
            width: min(1240px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 36px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 20px;
            padding: 18px 20px;
            border: 1px solid var(--line-soft);
            border-radius: 8px;
            background: rgba(18, 22, 27, 0.74);
            box-shadow: 0 18px 60px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(18px);
        }

        .eyebrow {
            margin: 0 0 8px;
            color: var(--accent);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0;
        }

        h1 {
            margin: 0;
            font-size: clamp(28px, 4vw, 42px);
            line-height: 1.12;
        }

        .subtitle {
            max-width: 560px;
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.65;
        }

        .status {
            min-width: min(360px, 100%);
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(10, 13, 16, 0.82);
        }

        .status-line {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 24px;
            color: var(--warning);
            font-weight: 700;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 18px currentColor;
            flex: 0 0 auto;
        }

        .status.ready .status-line {
            color: var(--accent);
        }

        .status.error .status-line {
            color: var(--danger);
        }

        #progress-container {
            width: 100%;
            height: 8px;
            margin-top: 12px;
            overflow: hidden;
            display: none;
            border-radius: 999px;
            background: #303841;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent), #7ee8d8);
            transition: width 0.2s ease;
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 340px;
            gap: 20px;
            align-items: start;
        }

        .stage {
            position: relative;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #050607;
            box-shadow: var(--shadow);
        }

        .stage-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            min-height: 52px;
            padding: 0 16px;
            border-bottom: 1px solid var(--line);
            background: rgba(20, 25, 30, 0.92);
        }

        .stage-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 800;
        }

        .stage-title::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 14px var(--accent);
        }

        .stage-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-size: 13px;
        }

        .mode-chip {
            min-width: 76px;
            padding: 5px 10px;
            border: 1px solid rgba(34, 199, 169, 0.35);
            border-radius: 8px;
            color: var(--accent);
            background: var(--accent-soft);
            text-align: center;
            font-weight: 800;
        }

        .stage::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: inherit;
            z-index: 1;
        }

        canvas {
            display: block;
            width: 100%;
            max-width: 100%;
            height: auto;
            aspect-ratio: var(--camera-aspect, 4 / 3);
            background: #000;
        }

        .panel {
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
            background: rgba(22, 27, 32, 0.94);
            box-shadow: 0 18px 60px rgba(0, 0, 0, 0.24);
        }

        .panel-header {
            padding: 18px;
            border-bottom: 1px solid var(--line);
            background: rgba(11, 14, 17, 0.34);
        }

        .panel-heading {
            margin: 0;
            font-size: 20px;
            line-height: 1.2;
        }

        .panel-subtitle {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .panel-section {
            padding: 18px;
            border-bottom: 1px solid var(--line);
        }

        .panel-section:last-child {
            border-bottom: 0;
        }

        .panel-title {
            margin: 0 0 12px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        .mode-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        button {
            min-height: 44px;
            padding: 0 14px;
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--text);
            background: var(--surface-2);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
        }

        button:hover {
            transform: translateY(-1px);
            border-color: rgba(24, 199, 167, 0.55);
            background: #273039;
        }

        button:focus-visible,
        input:focus-visible {
            outline: 3px solid rgba(24, 199, 167, 0.35);
            outline-offset: 2px;
        }

        .mode-button.active {
            color: var(--ink);
            background: var(--accent);
            border-color: var(--accent);
        }

        .mode-button {
            display: grid;
            grid-template-columns: 32px 1fr;
            align-items: center;
            gap: 10px;
            min-height: 52px;
            text-align: left;
        }

        .mode-index {
            display: grid;
            place-items: center;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            color: var(--accent);
            background: rgba(34, 199, 169, 0.10);
            font-variant-numeric: tabular-nums;
            font-size: 13px;
        }

        .mode-button.active .mode-index {
            color: var(--ink);
            background: rgba(8, 11, 13, 0.12);
        }

        .mode-name {
            font-size: 15px;
        }

        .action-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .photo-button {
            background: var(--photo);
        }

        .photo-button:hover {
            border-color: rgba(91, 140, 255, 0.68);
            background: #6d9aff;
        }

        .danger-button {
            background: rgba(239, 91, 91, 0.14);
            border-color: rgba(239, 91, 91, 0.45);
            color: #ffb6b6;
        }

        .danger-button:hover {
            border-color: rgba(239, 91, 91, 0.75);
            background: rgba(239, 91, 91, 0.22);
        }

        .range-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .intensity-section {
            transition: opacity 0.18s ease, transform 0.18s ease;
        }

        .intensity-section.is-hidden {
            display: none;
        }

        .range-head .panel-title {
            margin: 0;
        }

        #intensityValue {
            min-width: 46px;
            padding: 5px 9px;
            border-radius: 8px;
            color: var(--accent);
            background: rgba(24, 199, 167, 0.12);
            font-variant-numeric: tabular-nums;
            text-align: center;
            font-weight: 800;
        }

        input[type="range"] {
            width: 100%;
            height: 26px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .range-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            color: var(--muted);
            font-size: 12px;
            font-variant-numeric: tabular-nums;
        }

        @media (max-width: 900px) {
            .topbar,
            .workspace {
                grid-template-columns: 1fr;
                display: grid;
            }

            .status {
                min-width: 0;
            }

            .workspace {
                gap: 16px;
            }
        }

        @media (max-width: 700px) {
            .app {
                width: min(100% - 24px, 1180px);
                padding: 14px 0 24px;
            }

            .topbar {
                gap: 16px;
                padding: 16px;
            }

            .eyebrow {
                margin-bottom: 6px;
                font-size: 12px;
            }

            h1 {
                font-size: clamp(28px, 9vw, 38px);
            }

            .subtitle {
                font-size: 14px;
                line-height: 1.65;
            }

            .status {
                padding: 12px;
            }

            .stage,
            .panel,
            .topbar,
            .status {
                border-radius: 8px;
            }

            .mode-grid {
                grid-template-columns: 1fr;
            }

            .stage-bar {
                min-height: auto;
                padding: 12px;
                align-items: flex-start;
                flex-direction: column;
                gap: 8px;
            }

            .stage-meta {
                width: 100%;
                justify-content: space-between;
            }

            .panel-header,
            .panel-section {
                padding: 16px;
            }

            .mode-button {
                min-height: 50px;
            }

            button {
                min-height: 48px;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <header class="topbar">
            <div>
                <p class="eyebrow">OpenCV.js Camera Lab</p>
                <h1>摄像头图像扭曲工作台</h1>
                <p class="subtitle">实时预览波浪、凸透镜与凹透镜效果，支持调节扭曲强度并保存当前画面。</p>
            </div>
            <div id="status" class="status">
                <div class="status-line">
                    <span class="status-dot" aria-hidden="true"></span>
                    <span id="status-text">正在加载 OpenCV.js...</span>
                </div>
                <div id="progress-container">
                    <div id="progress-bar"></div>
                </div>
            </div>
        </header>

        <video id="video" width="640" height="480" autoplay playsinline style="display: none;"></video>

        <section class="workspace" aria-label="图像处理工作区">
            <div class="stage">
                <div class="stage-bar">
                    <div class="stage-title">实时画面</div>
                    <div class="stage-meta">
                        <span id="modeLabel" class="mode-chip">正常</span>
                        <span id="resolutionLabel">等待摄像头</span>
                    </div>
                </div>
                <canvas id="canvas" width="640" height="480"></canvas>
            </div>

            <aside class="panel" aria-label="控制面板">
                <div class="panel-header">
                    <h2 class="panel-heading">控制台</h2>
                    <p class="panel-subtitle">选择效果、保存画面或关闭摄像头。</p>
                </div>

                <div class="panel-section">
                    <p class="panel-title">扭曲模式</p>
                    <div class="mode-grid">
                        <button class="mode-button active" data-mode="0" onclick="setMode(0)">
                            <span class="mode-index">0</span>
                            <span class="mode-name">正常</span>
                        </button>
                        <button class="mode-button" data-mode="1" onclick="setMode(1)">
                            <span class="mode-index">1</span>
                            <span class="mode-name">波浪</span>
                        </button>
                        <button class="mode-button" data-mode="2" onclick="setMode(2)">
                            <span class="mode-index">2</span>
                            <span class="mode-name">凸透镜</span>
                        </button>
                        <button class="mode-button" data-mode="3" onclick="setMode(3)">
                            <span class="mode-index">3</span>
                            <span class="mode-name">凹透镜</span>
                        </button>
                    </div>
                </div>

                <div id="intensityPanel" class="panel-section intensity-section is-hidden">
                    <div class="range-head">
                        <label class="panel-title" for="intensityRange">扭曲程度</label>
                        <span id="intensityValue">1.0</span>
                    </div>
                    <input type="range" id="intensityRange" min="0" max="1.5" step="0.05" value="1.0" onchange="updateIntensity(this.value)" oninput="updateIntensity(this.value)">
                    <div class="range-labels" aria-hidden="true">
                        <span>0</span>
                        <span>1.5</span>
                    </div>
                </div>

                <div class="panel-section">
                    <p class="panel-title">操作</p>
                    <div class="action-row">
                        <button class="photo-button" onclick="takePhoto()">拍照并保存</button>
                        <button class="danger-button" onclick="stopCamera()">关闭摄像头</button>
                    </div>
                </div>
            </aside>
        </section>
    </main>

    <script>
        function setStatusMessage(text, state = "loading") {
            const statusEl = document.getElementById('status');
            const statusText = document.getElementById('status-text');
            statusText.innerText = text;
            statusEl.classList.remove('ready', 'error');
            if (state === "ready" || state === "error") {
                statusEl.classList.add(state);
            }
        }

        // Module object to listen for OpenCV.js being ready and print its loading phase
        var Module = {
            setStatus: function(text) {
                if (text) {
                    setStatusMessage(text);
                }
            },
            onRuntimeInitialized: function() {
                onOpenCvReady();
            }
        };
    </script>

    <!-- 使用 Fetch 手动加载并监控进度，从而代替直接引入 script -->
    <script>
        (async function loadOpenCV() {
            const progressContainer = document.getElementById('progress-container');
            const progressBar = document.getElementById('progress-bar');
            
            // 使用另一个 CDN 能够提供 CORS 和进度
            const url = 'https://cdn.jsdelivr.net/npm/opencv.js@1.2.1/opencv.min.js';
            progressContainer.style.display = 'block';

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("网络错误");
                
                const contentLength = response.headers.get('content-length');
                if (!contentLength) {
                    setStatusMessage("正在下载 OpenCV.js...");
                }
                
                const total = parseInt(contentLength, 10);
                let loaded = 0;
                
                const reader = response.body.getReader();
                const chunks = [];
                
                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    
                    chunks.push(value);
                    loaded += value.length;
                    
                    if (total) {
                        const percent = (loaded / total) * 100;
                        progressBar.style.width = percent + '%';
                        setStatusMessage(`正在下载 OpenCV.js... ${Math.round(percent)}%`);
                    } else {
                        setStatusMessage(`正在下载 OpenCV.js... ${(loaded/1024/1024).toFixed(2)} MB`);
                    }
                }
                
                setStatusMessage("下载完成，正在解析...");
                progressContainer.style.display = 'none';
                
                // 将代码合成字符串并执行
                const blob = new Blob(chunks, { type: 'application/javascript' });
                const blobUrl = URL.createObjectURL(blob);
                
                const script = document.createElement('script');
                script.src = blobUrl;
                script.onload = () => { URL.revokeObjectURL(blobUrl); };
                document.body.appendChild(script);
                
            } catch (err) {
                console.error("加载 OpenCV.js 失败:", err);
                progressContainer.style.display = 'none';
                setStatusMessage("加载 OpenCV.js 失败，请刷新重试。", "error");
            }
        })();
    </script>
    
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const intensityPanel = document.getElementById('intensityPanel');
        const modeLabel = document.getElementById('modeLabel');
        const resolutionLabel = document.getElementById('resolutionLabel');
        let isOpenCvReady = false;
        let mode = 0;
        let intensity = 1.0;
        const modeNames = ["正常", "波浪", "凸透镜", "凹透镜"];

        // 预先计算好的映射表
        let map_x_wave, map_y_wave;
        let map_x_bulge, map_y_bulge;
        let map_x_pinch, map_y_pinch;
        
        // OpenCV 矩阵变量，避免内存泄漏
        let srcMat, dstMat;

        function getPreferredVideoConstraints() {
            const isPortrait = window.matchMedia("(orientation: portrait)").matches;
            return {
                audio: false,
                video: {
                    facingMode: "user",
                    width: { ideal: isPortrait ? 720 : 1280 },
                    height: { ideal: isPortrait ? 1280 : 720 },
                    aspectRatio: { ideal: isPortrait ? 9 / 16 : 16 / 9 }
                }
            };
        }

        function syncCanvasSize(width, height) {
            canvas.width = width;
            canvas.height = height;
            canvas.style.setProperty('--camera-aspect', `${width} / ${height}`);
            resolutionLabel.innerText = `${width} x ${height}`;
        }

        function setMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.mode-button').forEach(button => {
                button.classList.toggle('active', Number(button.dataset.mode) === mode);
            });
            intensityPanel.classList.toggle('is-hidden', mode === 0);
            modeLabel.innerText = modeNames[mode];
        }
        
        function updateIntensity(value) {
            intensity = parseFloat(value);
            document.getElementById('intensityValue').innerText = intensity.toFixed(2);
            if (isOpenCvReady && video.videoWidth > 0 && video.videoHeight > 0) {
                // 重新计算映射表
                initDistortionMaps(video.videoWidth, video.videoHeight);
            }
        }
        
        function takePhoto() {
            if (!isOpenCvReady || !video.srcObject) {
                alert("摄像头尚未运行，无法拍照！");
                return;
            }
            // 获取当前 Canvas 上的图像数据，转为 Data URL
            const dataUrl = canvas.toDataURL("image/jpeg", 0.9);
            // 创建一个隐藏的 a 标签来触发下载
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = `photo_${new Date().getTime()}.jpg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // 简单的拍照反馈动画效果
            canvas.style.opacity = 0.5;
            setTimeout(() => { canvas.style.opacity = 1; }, 200);
        }

        // OpenCV.js 加载完成后的回调
        function onOpenCvReady() {
            isOpenCvReady = true;
            setStatusMessage("OpenCV.js 已加载，请求摄像头权限...");
            startCamera();
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia(getPreferredVideoConstraints())
                .catch(function(err) {
                    console.warn("使用推荐摄像头比例失败，回退到默认摄像头配置:", err);
                    return navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                })
                .then(function(stream) {
                    video.srcObject = stream;
                    video.play();
                    
                    video.onloadedmetadata = () => {
                        const width = video.videoWidth;
                        const height = video.videoHeight;
                        syncCanvasSize(width, height);
                        
                        // 初始化 OpenCV 矩阵和映射表
                        initDistortionMaps(width, height);
                        srcMat = new cv.Mat(height, width, cv.CV_8UC4);
                        dstMat = new cv.Mat(height, width, cv.CV_8UC4);
                        
                        setStatusMessage("摄像头正在运行", "ready");
                        requestAnimationFrame(processVideo);
                    };
                })
                .catch(function(err) {
                    console.log("摄像头获取失败:", err);
                    setStatusMessage("错误：无法访问摄像头，请检查权限。", "error");
                });
        }

        function stopCamera() {
            if (video.srcObject) {
                // 停止所有摄像头轨道
                video.srcObject.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                setStatusMessage("摄像头已关闭", "ready");
                resolutionLabel.innerText = "摄像头已关闭";

                // 清空视频显示区域
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = "#000";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#FFF";
                ctx.font = "22px Arial";
                ctx.textAlign = "center";
                ctx.fillText("摄像头已关闭，请刷新页面重新开启", canvas.width / 2, canvas.height / 2);
                ctx.textAlign = "left";
            }
        }

        // 对应 Python 版的 init_distortion_maps
        function initDistortionMaps(width, height) {
            // 如果之前有分配内存，在重新生成时先释放（如果不释放会导致内存泄漏）
            if (map_x_wave && !map_x_wave.isDeleted()) {
                map_x_wave.delete(); map_y_wave.delete();
                map_x_bulge.delete(); map_y_bulge.delete();
                map_x_pinch.delete(); map_y_pinch.delete();
            }
            
            map_x_wave = new cv.Mat(height, width, cv.CV_32FC1);
            map_y_wave = new cv.Mat(height, width, cv.CV_32FC1);
            map_x_bulge = new cv.Mat(height, width, cv.CV_32FC1);
            map_y_bulge = new cv.Mat(height, width, cv.CV_32FC1);
            map_x_pinch = new cv.Mat(height, width, cv.CV_32FC1);
            map_y_pinch = new cv.Mat(height, width, cv.CV_32FC1);

            const cx = width / 2.0;
            const cy = height / 2.0;
            const R_max = Math.sqrt(cx*cx + cy*cy) + 1;

            // 为了性能，在 JS 中直接用嵌套循环计算
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    // 1. Wave: 使用 intensity 控制波动幅度
                    map_x_wave.floatPtr(y, x)[0] = x + (20 * intensity) * Math.sin(y / 20.0);
                    map_y_wave.floatPtr(y, x)[0] = y;

                    // 极坐标用于透镜
                    const dx = x - cx;
                    const dy = y - cy;
                    const r = Math.sqrt(dx*dx + dy*dy);
                    let theta = Math.atan2(dy, dx);

                    // 2. Bulge: 膨胀幅度受 intensity 控制
                    const r_bulge_base = r * (r / R_max);
                    const r_bulge = r + (r_bulge_base - r) * intensity;
                    map_x_bulge.floatPtr(y, x)[0] = cx + r_bulge * Math.cos(theta);
                    map_y_bulge.floatPtr(y, x)[0] = cy + r_bulge * Math.sin(theta);

                    // 3. Pinch: 缩小幅度受 intensity 控制
                    const r_pinch_base = Math.sqrt(r * R_max);
                    const r_pinch = r + (r_pinch_base - r) * intensity;
                    map_x_pinch.floatPtr(y, x)[0] = cx + r_pinch * Math.cos(theta);
                    map_y_pinch.floatPtr(y, x)[0] = cy + r_pinch * Math.sin(theta);
                }
            }
        }

        function processVideo() {
            if (!isOpenCvReady || video.readyState !== video.HAVE_ENOUGH_DATA) {
                requestAnimationFrame(processVideo);
                return;
            }

            try {
                // 将视频帧绘制到一个临时的大小的 canvas / 处理上下文中
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // 将 Canvas 图像读取到 OpenCV Mat 中
                let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                srcMat.data.set(imageData.data);

                if (mode === 0) {
                    cv.imshow('canvas', srcMat);
                } else {
                    let map_x, map_y;
                    if (mode === 1) { map_x = map_x_wave; map_y = map_y_wave; }
                    else if (mode === 2) { map_x = map_x_bulge; map_y = map_y_bulge; }
                    else if (mode === 3) { map_x = map_x_pinch; map_y = map_y_pinch; }

                    // 执行映射 (remap)
                    cv.remap(srcMat, dstMat, map_x, map_y, cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar(0, 0, 0, 255));
                    cv.imshow('canvas', dstMat);
                }

                // 在画面上绘制提示文本
                ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
                ctx.font = "20px Arial";
                ctx.fillText(mode === 0 ? modeNames[mode] : `${modeNames[mode]} / ${intensity.toFixed(2)}`, 20, 36);

            } catch (err) {
                console.error(err);
            }

            requestAnimationFrame(processVideo);
        }
    </script>
</body>
</html>
